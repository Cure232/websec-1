<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/media600px.css">
    <title>Лабораторная работа №1: Калькулятор</title>
</head>
<body>
    <form class="calculator" id="calculator">
        <div class="calculator__row">
            <input type="number" name="input_one" class="calculator__input" placeholder="123">
            <select class="calculator__select">
                <option value="+" selected>+</option>
                <option value="-">-</option>
                <option value="*">*</option>
                <option value="/">/</option>
            </select>
            <input type="number" name="input_two" class="calculator__input" placeholder="456">
        </div>
        <div class="calculator__row">
            <button type="submit" class="calculator__button" name="calculate">подсчитать</button>
        </div>
        <div class="calculator__row">
            <div id="resultPanel" class="calculator__result"></div>
        </div>
    </form>
    <script src="./js/calculator.js"></script>
</body>
</html>
